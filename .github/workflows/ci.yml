name: CI

on:
  push:
    branches: [develop, main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .

  tests:
    name: Frappe Tests
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        frappe-branch: ["version-16"]

    services:
      mariadb:
        image: mariadb:11.3
        env:
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s --health-timeout=5s --health-retries=10
      redis:
        image: redis:alpine
        ports:
          - 6379:6379

    steps:
      - name: Clone app
        uses: actions/checkout@v4
        with:
          path: office_automation

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y mariadb-client libmysqlclient-dev
          npm install -g yarn
          pip install frappe-bench

      - name: Init bench & site
        run: |
          bench init --skip-redis-config-generation --frappe-branch ${{ matrix.frappe-branch }} frappe-bench
          cd frappe-bench
          sed -i 's/watch:/# watch:/g' Procfile
          sed -i 's/schedule:/# schedule:/g' Procfile
          sed -i 's/socketio:/# socketio:/g' Procfile
          bench set-config -g db_host 127.0.0.1
          bench set-config -g redis_cache redis://127.0.0.1:6379
          bench set-config -g redis_queue redis://127.0.0.1:6379
          bench set-config -g redis_socketio redis://127.0.0.1:6379
          bench new-site test_site --mariadb-root-password root --admin-password admin --no-mariadb-socket
          bench get-app office_automation $GITHUB_WORKSPACE/office_automation
          bench --site test_site install-app office_automation
        env:
          CI: "true"

      - name: Run tests
        working-directory: frappe-bench
        run: |
          bench --site test_site set-config allow_tests true
          bench --site test_site run-tests --app office_automation
        env:
          CI: "true"
